services:
  navidrome:
    image: deluan/navidrome
    restart: unless-stopped
    expose:
      - "4533"
    volumes:
      - ./navidrome-config:/data
      - C:\drifttide\storage\music:/music:ro
    environment:
      ND_SCANSCHEDULE: 1h
      ND_LOGLEVEL: info
      ND_BASEURL: ""

  filebrowser:
    image: filebrowser/filebrowser
    restart: unless-stopped
    expose:
      - "80"
    volumes:
      - C:\drifttide\storage:/srv
      - ./filebrowser-config.json:/config.json
      - ./filebrowser.db:/database.db
    command: --database /database.db --config /config.json
  seashell:
    build: ./seashell
    restart: unless-stopped
    env_file:
      - ./seashell/.env
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      - OPENAI_API_BASE_URL=http://seashell:3000/v1
      - OPENAI_API_KEY=not-needed
    volumes:
      - ./open-webui-data:/app/backend/data
  searxng:
    image: docker.io/searxng/searxng:latest
    restart: unless-stopped
    expose:
      - "8080"
    volumes:
      - ./searxng/core-config/:/etc/searxng/
      - searxng-data:/var/cache/searxng/
    environment:
      - SEARXNG_BASE_URL=https://search.drift-tide.com
  valkey:
    image: docker.io/valkey/valkey:9-alpine
    restart: unless-stopped
    command: valkey-server --save 30 1 --loglevel warning
    volumes:
      - valkey-data:/data/
  # mcpo:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile.mcpo
  #   restart: unless-stopped
  #   expose:
  #     - "8000"
  #   volumes:
  #     - ./mcpo-config.json:/app/config.json
  #     - ./memory-data:/memory-data
  caddy:
    image: caddy:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./caddy-data:/data
      - ./caddy-config:/config
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
  immich-server:
    image: ghcr.io/immich-app/immich-server:release
    restart: unless-stopped
    expose:
      - "2283"
    volumes:
      - ./immich-data:/usr/src/app/upload
      - /etc/localtime:/etc/localtime:ro
    environment:
      - DB_HOSTNAME=immich-postgres
      - DB_USERNAME=immich
      - DB_PASSWORD=changeme
      - DB_DATABASE_NAME=immich
      - REDIS_HOSTNAME=immich-redis
    depends_on:
      - immich-redis
      - immich-postgres

  immich-machine-learning:
    image: ghcr.io/immich-app/immich-machine-learning:release
    restart: unless-stopped
    volumes:
      - ./immich-model-cache:/cache

  immich-redis:
    image: redis:6.2-alpine
    restart: unless-stopped

  immich-postgres:
    image: tensorchord/pgvecto-rs:pg14-v0.2.0
    restart: unless-stopped
    environment:
      - POSTGRES_PASSWORD=changeme
      - POSTGRES_USER=immich
      - POSTGRES_DB=immich
    volumes:
      - ./immich-postgres:/var/lib/postgresql/data
volumes:
  searxng-data:
  valkey-data:
